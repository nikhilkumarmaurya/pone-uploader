<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pone.rs uploader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #00ff88;
    --accent2: #00ccff;
    --text: #e0e0e0;
    --muted: #555555;
    --error: #ff4466;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 640px;
    position: relative;
    z-index: 1;
  }

  .header { margin-bottom: 32px; }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 8px;
  }

  .title {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .title span { color: var(--accent); }

  .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  .dropzone {
    border: 1.5px dashed var(--border);
    border-radius: 4px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    display: block;
  }

  .dropzone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,255,136,0.04) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .dropzone:hover::before, .dropzone.drag-over::before { opacity: 1; }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    border-style: solid;
  }

  .drop-icon { font-size: 36px; margin-bottom: 16px; display: block; }

  .drop-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
  }

  .drop-text strong { color: var(--accent); }

  .file-queue { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }

  .file-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .file-remove {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; padding: 2px 6px;
    border-radius: 3px; transition: color 0.15s, background 0.15s;
    font-family: monospace; flex-shrink: 0;
  }
  .file-remove:hover { color: var(--error); background: rgba(255,68,102,0.1); }

  .actions-row { display: flex; gap: 8px; margin-top: 12px; }

  .upload-btn {
    flex: 1; padding: 14px;
    background: var(--accent); color: #000;
    border: none; border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .upload-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .upload-btn:not(:disabled):hover {
    background: #00ffaa;
    box-shadow: 0 4px 20px rgba(0,255,136,0.3);
  }

  .clear-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 3px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 8px 14px;
    cursor: pointer; transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--error); color: var(--error); }

  .progress-wrap { margin-top: 16px; display: none; }
  .progress-wrap.visible { display: block; }

  .progress-label {
    font-size: 11px; color: var(--muted);
    margin-bottom: 8px; display: flex; justify-content: space-between;
  }

  .progress-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%; transition: width 0.3s ease;
  }

  .results { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }

  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 14px 16px;
    animation: slideIn 0.2s ease;
  }
  .result-item.success { border-color: rgba(0,255,136,0.3); }
  .result-item.error { border-color: rgba(255,68,102,0.3); }

  .result-filename {
    font-size: 11px; color: var(--muted);
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .result-filename::before { content: '→'; color: var(--accent); }

  .link-row { display: flex; gap: 8px; align-items: center; }

  .link-input {
    flex: 1; background: #0d0d0d;
    border: 1px solid var(--border); border-radius: 3px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--accent2);
    outline: none; min-width: 0;
  }

  .copy-btn {
    background: var(--border); border: 1px solid #333;
    border-radius: 3px; color: var(--text);
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 8px 14px;
    transition: all 0.15s; white-space: nowrap;
  }
  .copy-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }
  .copy-btn.copied { background: var(--accent); border-color: var(--accent); color: #000; }

  .open-btn {
    background: none; border: 1px solid #333; border-radius: 3px;
    color: var(--muted); cursor: pointer; font-size: 14px;
    padding: 7px 10px; transition: all 0.15s;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .open-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .error-text { font-size: 11px; color: var(--error); }

  .status-bar {
    margin-top: 32px; display: flex; justify-content: space-between;
    font-size: 10px; color: var(--muted); letter-spacing: 1px;
    padding-top: 16px; border-top: 1px solid var(--border);
  }

  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent);
    margin-right: 6px; animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">// file uploader</div>
    <div class="title">pone<span>.</span>rs</div>
    <div class="subtitle">upload → get direct link → done. no account needed.</div>
  </div>

  <label for="fileInput" class="dropzone" id="dropzone">
    <span class="drop-icon">📂</span>
    <div class="drop-text">
      Drag & drop files here<br>
      or <strong>browse files</strong><br><br>
      <span style="font-size:10px;opacity:0.5;">any file type · multiple files · up to 1GB</span>
    </div>
  </label>
  <input type="file" id="fileInput" multiple style="display:none;">

  <div class="file-queue" id="fileQueue"></div>

  <div class="actions-row" id="actionsRow" style="display:none;">
    <button class="upload-btn" id="uploadBtn" onclick="uploadFiles()">⬆ Upload All</button>
    <button class="clear-btn" onclick="clearAll()">✕ Clear</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">uploading...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="results" id="results"></div>

  <div class="status-bar">
    <span><span class="status-dot"></span>pone.rs proxy active</span>
    <span>permanent storage · any file type</span>
  </div>

</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const dropzone = document.getElementById('dropzone');
  const fileQueue = document.getElementById('fileQueue');
  const actionsRow = document.getElementById('actionsRow');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const progressPct = document.getElementById('progressPct');
  const resultsDiv = document.getElementById('results');

  let selectedFiles = [];

  // Drag & Drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    fileInput.value = '';
  });

  function addFiles(files) {
    files.forEach(f => {
      if (!selectedFiles.find(x => x.name === f.name && x.size === f.size))
        selectedFiles.push(f);
    });
    renderQueue();
  }

  function renderQueue() {
    fileQueue.innerHTML = '';
    actionsRow.style.display = selectedFiles.length === 0 ? 'none' : 'flex';
    selectedFiles.forEach((f, i) => {
      const div = document.createElement('div');
      div.className = 'file-item';
      div.innerHTML = `
        <span style="font-size:18px">${getIcon(f.name)}</span>
        <div class="file-info">
          <div class="file-name">${esc(f.name)}</div>
          <div class="file-size">${fmtSize(f.size)}</div>
        </div>
        <button class="file-remove" onclick="removeFile(${i})">✕</button>
      `;
      fileQueue.appendChild(div);
    });
  }

  function removeFile(i) { selectedFiles.splice(i, 1); renderQueue(); }

  function clearAll() {
    selectedFiles = [];
    renderQueue();
    resultsDiv.innerHTML = '';
    progressWrap.classList.remove('visible');
  }

  async function uploadFiles() {
    if (!selectedFiles.length) return;
    document.getElementById('uploadBtn').disabled = true;
    progressWrap.classList.add('visible');
    resultsDiv.innerHTML = '';

    const total = selectedFiles.length;

    for (let i = 0; i < total; i++) {
      const file = selectedFiles[i];
      progressText.textContent = `uploading ${i+1}/${total}: ${file.name}`;
      progressFill.style.width = Math.round((i / total) * 100) + '%';
      progressPct.textContent = Math.round((i / total) * 100) + '%';

      try {
        const formData = new FormData();
        formData.append('files[]', file);

        // POST to our own server (no CORS issue!)
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success && data.files && data.files[0].success) {
          addResult(file.name, data.files[0].url, true);
        } else {
          addResult(file.name, null, false, data.files?.[0]?.error || data.error || 'Upload failed');
        }
      } catch (err) {
        addResult(file.name, null, false, err.message);
      }
    }

    progressFill.style.width = '100%';
    progressPct.textContent = '100%';
    progressText.textContent = `done! ${total} file(s) processed`;
    document.getElementById('uploadBtn').disabled = false;
    selectedFiles = [];
    renderQueue();
  }

  function addResult(filename, url, success, errMsg) {
    const div = document.createElement('div');
    div.className = `result-item ${success ? 'success' : 'error'}`;
    div.innerHTML = success ? `
      <div class="result-filename">${esc(filename)}</div>
      <div class="link-row">
        <input class="link-input" type="text" value="${esc(url)}" readonly onclick="this.select()">
        <button class="copy-btn" onclick="copyLink(this,'${esc(url)}')">copy</button>
        <a class="open-btn" href="${esc(url)}" target="_blank">↗</a>
      </div>
    ` : `
      <div class="result-filename">${esc(filename)}</div>
      <div class="error-text">✗ ${esc(errMsg)}</div>
    `;
    resultsDiv.appendChild(div);
  }

  function copyLink(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '✓ copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1800);
    });
  }

  function getIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const m = { jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',svg:'🖼️',
      mp4:'🎬',webm:'🎬',mov:'🎬',mkv:'🎬',mp3:'🎵',wav:'🎵',flac:'🎵',
      pdf:'📄',doc:'📝',docx:'📝',txt:'📝',zip:'📦',rar:'📦','7z':'📦',
      js:'💻',py:'💻',html:'💻',json:'💻' };
    return m[ext] || '📁';
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
    return (b/1073741824).toFixed(2) + ' GB';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
